<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Картка — практична CSS</title>
  <link rel="stylesheet" href="card.css">
</head>
<body>
  <article class="card">
    <img class="card-image"
         src="1.webp" 
         alt="MacBook Pro 14 M5">

    <h3 class="card-title">Apple MacBook Pro 14" M5</h3>

    <p class="card-meta">
      Код: 492014 - В наявності
    </p>

    <p class="card-description"> Професійний компактний ноутбук від Apple, що забезпечує колосальний приріст продуктивності, особливо у завданнях зі штучним інтелектом та графікою
</p>
  

    <p class="card-price">99 499 ₴</p>

    <button class="card-action" type="button">Детальніше про товар</button>
  </article>

</body>
</html>
